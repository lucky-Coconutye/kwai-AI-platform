<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>画像资产平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">像</div>
      <button class="side-item active" data-section="market"><span>市</span>画像市场</button>
      <button class="side-item" data-section="user"><span>用</span>用户画像</button>
      <button class="side-item" data-section="merchant"><span>商</span>商家画像</button>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="headline">
          <div class="eyebrow">画像资产工作台</div>
          <h1>画像资产平台</h1>
          <p>基于用户画像底表与商家画像记录表，检索、查看和验证画像数据。</p>
        </div>
        <form class="global-search" id="searchForm">
          <input id="keywordInput" type="search" placeholder="搜索用户ID、商家ID、行业、服务、兴趣" />
          <button type="submit">搜索</button>
        </form>
      </header>

      <section class="filters">
        <div class="filters-head">
          <div>
            <h2>筛选条件</h2>
            <p id="filterModeHint">按画像类型、标签和结构化画像字段筛选。</p>
          </div>
          <button type="button" id="resetFilters" class="reset-filters">重置筛选</button>
        </div>
        <div class="filter-group">
          <span>画像类型</span>
          <div class="inline-chips">
            <button class="chip active" data-role="all">全部</button>
            <button class="chip" data-role="2">用户画像</button>
            <button class="chip" data-role="1">商家画像</button>
          </div>
        </div>
        <div class="filter-group">
          <span id="tagFilterLabel">行业/标签</span>
          <div class="inline-chips">
            <button class="chip active" data-industry="all">全部</button>
            <div id="industryChips" class="dynamic-chips"></div>
          </div>
        </div>
        <div id="advancedFilters" class="advanced-filters"></div>
        <div id="activeFilters" class="active-filters"></div>
      </section>

      <section class="content-grid">
        <section class="result-panel">
          <div class="panel-title">
            <div>
              <h2>画像列表</h2>
              <p id="resultCount">加载中</p>
            </div>
            <select id="sortSelect">
              <option value="default">默认排序</option>
              <option value="merchant">商家优先</option>
              <option value="user">用户优先</option>
            </select>
          </div>
          <div class="profile-list" id="profileList"></div>
        </section>

        <aside class="detail-panel">
          <form class="query-box" id="queryForm">
            <h3>画像查询</h3>
            <label>
              <span>查询对象</span>
              <select id="queryRole">
                <option value="2">普通用户</option>
                <option value="1">商家</option>
              </select>
            </label>
            <label>
              <span>画像 ID</span>
              <input id="queryId" value="1839980743" />
            </label>
            <button type="submit">查询画像</button>
            <p id="queryStatus">当前使用已导入的离线画像数据。</p>
          </form>

          <div class="panel-title compact detail-title">
            <div>
              <h2>画像详情</h2>
              <p id="detailSubtitle">选择左侧画像查看底表字段</p>
            </div>
          </div>
          <div id="profileDetail" class="profile-detail"></div>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
